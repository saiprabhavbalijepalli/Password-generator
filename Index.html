<!DOCTYPE html>
<html>
<head>
  <title>Password Generator</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="container">
    <h1>Password Generator</h1>

    <input type="text" id="password" readonly placeholder="Generated password">

    <label>Password Length:</label>
    <input type="number" id="length" value="12" min="4" max="30">

    <div>
      <input type="checkbox" id="uppercase" checked> Uppercase
    </div>

    <div>
      <input type="checkbox" id="numbers" checked> Numbers
    </div>

    <div>
      <input type="checkbox" id="symbols" checked> Symbols
    </div>

    <button onclick="generatePassword()">Generate Password</button>
    <button onclick="copyPassword()">Copy Password</button>

    <a href="https://digitalheroesco.com" target="_blank">
      <button>Built for Digital Heroes</button>
    </a>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
